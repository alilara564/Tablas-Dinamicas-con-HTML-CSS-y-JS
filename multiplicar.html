<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Multiplicar</title>
        <link rel="stylesheet" href="multiplicar.css">
        <script src = "multiplicar.js"></script>
    </head>
    
    <body>
        <h1>Tablas de Multiplicar</h1>
        <h2>Ingresa un número para generar su tabla</h2>

        <div class="input-container">
            <input 
            id = "cmpNumero"
            type="number" 
            class="inputNumero" 
            placeholder="Ingresa un número"
            min="1">
        </div>

        <div class="mensajeError" id="mensajeError">
            Ingresa un número válido
        </div>
    
        <input class="botonMultiplicar" type="button" onclick="generarDesdeInput()" value="Generar Tabla">

        <div class="tabla" id ="cmpTabla">
            <div class="fila">...</div>
        </div>
    </body>
</html>
